syntax = "proto3";
import "feature_state.proto";
import "feature_stage_plan.proto";

option csharp_namespace = "OneMoreTaskTracker.Proto.Features.UpdateStageOwnerCommand";
package mr_helper.features;

service StageOwnerUpdater {
  rpc Update (UpdateStageOwnerRequest) returns (FeatureDto);
}

// Role-prefixed `stage_owner_user_id` matches the new per-field wire vocabulary
// (see api-contract.md § "Naming evolution"). The legacy
// FeatureStagePlan.performer_user_id on the READ contract is untouched.
message UpdateStageOwnerRequest {
  int32        feature_id             = 1;
  FeatureState stage                  = 2;
  // Soft cross-service FK to the Users service. 0 = unassign (clear owner).
  // Negative values are coerced to 0 by the handler.
  int32        stage_owner_user_id    = 3;
  int32        caller_user_id         = 4;
  // Stage-scoped optimistic-concurrency token (FeatureStagePlan.Version).
  int32        expected_stage_version = 5;
}

message FeatureDto {
  int32        id                 = 1;
  string       title              = 2;
  string       description        = 3;
  FeatureState state              = 4;
  string       planned_start      = 5;
  string       planned_end        = 6;
  int32        lead_user_id       = 7;
  int32        manager_user_id    = 8;
  string       created_at         = 9;
  string       updated_at         = 10;
  repeated     FeatureStagePlan stage_plans = 11;
  int32        version            = 12;
}
