syntax = "proto3";

option csharp_namespace = "OneMoreTaskTracker.Proto.Features.GetFeatureBoundsQuery";
package mr_helper.features;

service BoundsGetter {
  rpc Get (GetFeatureBoundsRequest) returns (GetFeatureBoundsResponse);
}

message GetFeatureBoundsRequest {
  int32 manager_user_id = 1;
}

message GetFeatureBoundsResponse {
  string earliest_planned_start = 1;
  string latest_planned_end     = 2;
}
