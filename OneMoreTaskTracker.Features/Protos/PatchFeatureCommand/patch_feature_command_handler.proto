syntax = "proto3";
import "feature_state.proto";
import "feature_taxonomy.proto";

option csharp_namespace = "OneMoreTaskTracker.Proto.Features.PatchFeatureCommand";
package mr_helper.features;

service FeaturePatcher {
  rpc Patch (PatchFeatureRequest) returns (FeatureDto);
}

message PatchFeatureRequest {
  int32 id = 1;
  int32 caller_user_id = 2;
  optional int32 expected_version = 3;
  optional string title = 4;
  optional string description = 5;
  optional int32 lead_user_id = 6;
}

message FeatureDto {
  int32              id              = 1;
  string             title           = 2;
  string             description     = 3;
  FeatureState       state           = 4;
  string             planned_start   = 5;
  string             planned_end     = 6;
  int32              lead_user_id    = 7;
  int32              manager_user_id = 8;
  string             created_at      = 9;
  string             updated_at      = 10;
  FeatureTaxonomyDto taxonomy        = 11;
  int32              version         = 12;
}
