syntax = "proto3";
import "feature_state.proto";

option csharp_namespace = "OneMoreTaskTracker.Proto.Features.GetFeatureQuery";
package mr_helper.features;

service FeatureGetter {
  rpc Get (GetFeatureRequest) returns (FeatureDto);
}

message GetFeatureRequest {
  int32 id = 1;
}

message FeatureDto {
  int32        id               = 1;
  string       title            = 2;
  string       description      = 3;
  FeatureState state            = 4;
  string       planned_start    = 5;
  string       planned_end      = 6;
  int32        lead_user_id     = 7;
  int32        manager_user_id  = 8;
  string       created_at       = 9;
  string       updated_at       = 10;
}
