syntax = "proto3";
import "feature_state.proto";
import "feature_taxonomy.proto";

option csharp_namespace = "OneMoreTaskTracker.Proto.Features.CreateFeatureCommand";
package mr_helper.features;

service FeatureCreator {
  rpc Create (CreateFeatureRequest) returns (FeatureDto);
}

message CreateFeatureRequest {
  string title            = 1;
  string description      = 2;
  int32  lead_user_id     = 3;
  int32  manager_user_id  = 4;
  string planned_start    = 5;
  string planned_end      = 6;
}

message FeatureDto {
  int32              id              = 1;
  string             title           = 2;
  string             description     = 3;
  FeatureState       state           = 4;
  string             planned_start   = 5;
  string             planned_end     = 6;
  int32              lead_user_id    = 7;
  int32              manager_user_id = 8;
  string             created_at      = 9;
  string             updated_at      = 10;
  FeatureTaxonomyDto taxonomy        = 11;
  int32              version         = 12;
}
