syntax = "proto3";
import "feature_taxonomy.proto";

option csharp_namespace = "OneMoreTaskTracker.Proto.Features.DeleteFeatureSubStageCommand";
package mr_helper.features;

service FeatureSubStageDeleter {
  rpc Delete (DeleteFeatureSubStageRequest) returns (FeatureTaxonomyResponse);
}

message DeleteFeatureSubStageRequest {
  int32          feature_id       = 1;
  int32          sub_stage_id     = 2;
  int32          caller_user_id   = 3;
  optional int32 expected_version = 4;
}

message FeatureTaxonomyResponse {
  int32              feature_id      = 1;
  int32              feature_version = 2;
  FeatureTaxonomyDto taxonomy        = 3;
}
