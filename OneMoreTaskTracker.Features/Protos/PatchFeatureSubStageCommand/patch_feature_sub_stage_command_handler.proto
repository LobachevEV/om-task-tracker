syntax = "proto3";
import "feature_taxonomy.proto";

option csharp_namespace = "OneMoreTaskTracker.Proto.Features.PatchFeatureSubStageCommand";
package mr_helper.features;

service FeatureSubStagePatcher {
  rpc Patch (PatchFeatureSubStageRequest) returns (FeatureTaxonomyResponse);
}

message PatchFeatureSubStageRequest {
  int32           feature_id        = 1;
  int32           sub_stage_id      = 2;
  int32           caller_user_id    = 3;
  optional int32  expected_version  = 4;
  optional int32  owner_user_id     = 5;
  optional string planned_start     = 6;
  optional string planned_end       = 7;
}

message FeatureTaxonomyResponse {
  int32              feature_id      = 1;
  int32              feature_version = 2;
  FeatureTaxonomyDto taxonomy        = 3;
}
