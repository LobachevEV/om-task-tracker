syntax = "proto3";
import "feature_state.proto";
import "feature_stage_plan.proto";

option csharp_namespace = "OneMoreTaskTracker.Proto.Features.PatchFeatureStageCommand";
package mr_helper.features;

service FeatureStagePatcher {
  rpc Patch (PatchFeatureStageRequest) returns (FeatureDto);
}

message PatchFeatureStageRequest {
  int32        feature_id             = 1;
  FeatureState stage                  = 2;
  int32        caller_user_id         = 3;
  optional int32 expected_stage_version = 4;
  optional int32  stage_owner_user_id  = 5;
  optional string planned_start        = 6;
  optional string planned_end          = 7;
}

message FeatureDto {
  int32        id                 = 1;
  string       title              = 2;
  string       description        = 3;
  FeatureState state              = 4;
  string       planned_start      = 5;
  string       planned_end        = 6;
  int32        lead_user_id       = 7;
  int32        manager_user_id    = 8;
  string       created_at         = 9;
  string       updated_at         = 10;
  repeated     FeatureStagePlan stage_plans = 11;
  int32        version            = 12;
}
