syntax = "proto3";

option csharp_namespace = "OneMoreTaskTracker.Proto.Users";
package mr_helper.users;

service UserService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Authenticate(AuthenticateRequest) returns (AuthenticateResponse);
  rpc GetTeamMemberIds(GetTeamMemberIdsRequest) returns (GetTeamMemberIdsResponse);
  rpc GetTeamRoster(GetTeamRosterRequest) returns (GetTeamRosterResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  int32 manager_id = 3;
  string role = 4;
}

message RegisterResponse {
  int32 user_id = 1;
  string email = 2;
  string role = 3;
  int32 manager_user_id = 4;
}

message AuthenticateRequest {
  string email = 1;
  string password = 2;
}

message AuthenticateResponse {
  bool success = 1;
  int32 user_id = 2;
  string email = 3;
  string role = 4;
  int32 manager_user_id = 5;
}

message GetTeamMemberIdsRequest {
  int32 manager_id = 1;
}

message GetTeamMemberIdsResponse {
  repeated int32 user_ids = 1;
}

message GetTeamRosterRequest {
  int32 manager_id = 1;
}

message TeamRosterMember {
  int32 user_id = 1;
  string email = 2;
  string role = 3;
  int32 manager_id = 4;
}

message GetTeamRosterResponse {
  repeated TeamRosterMember members = 1;
}

message DeleteUserRequest {
  int32 user_id = 1;
  int32 manager_id = 2;
}

message DeleteUserResponse {
}
