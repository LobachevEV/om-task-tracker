syntax = "proto3";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "OneMoreTaskTracker.Proto.Tasks.GetUserStatusQuery";
package mr_helper.tasks;

service UserStatusQuery {
  rpc BatchGetUserStatus(BatchGetUserStatusRequest) returns (BatchGetUserStatusResponse);
}

message BatchGetUserStatusRequest {
  repeated int32 user_ids = 1;
}

message UserStateMix {
  int32 in_dev = 1;
  int32 mr_to_release = 2;
  int32 in_test = 3;
  int32 mr_to_master = 4;
  int32 completed = 5;
}

message UserStatus {
  int32 user_id = 1;
  int32 active = 2;
  google.protobuf.Timestamp last_active = 3;
  UserStateMix mix = 4;
}

message BatchGetUserStatusResponse {
  repeated UserStatus statuses = 1;
}
