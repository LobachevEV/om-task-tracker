syntax = "proto3";

option csharp_namespace = "OneMoreTaskTracker.Proto.Clients.MergeRequests";

package mr_helper.git_lab.proxy.merge_requests;

service MrMerger{
  rpc Merge (stream MergeMrRequest) returns (stream MergeMrResponse);
}

message MergeMrRequest{
  int32 mr_id = 1;
  int32 project_id = 2;
}

message MergeMrResponse{
  MergeMrStatus status = 1;
}

enum MergeMrStatus{
  SUCCESS = 0;
  FAIL = 1;
}
