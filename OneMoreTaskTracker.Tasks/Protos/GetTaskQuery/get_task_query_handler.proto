syntax = "proto3";
import "task_state.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "OneMoreTaskTracker.Proto.Tasks.GetTaskQuery";
package mr_helper.tasks;

service TaskGetter{
  rpc Get(GetTaskRequest) returns (GetTaskResponse);
}

message GetTaskRequest{
  string task_id = 1;
  int32 user_id = 2;
  google.protobuf.Timestamp first_push_date = 3;
}

message GetTaskResponse{
  string id = 1;
  TaskState state = 2;
  repeated ProjectDto projects = 3;
  repeated MergeRequestDto merge_requests = 4;
}

message ProjectDto{
  int32 id = 1;
  string name = 2;
}


message MergeRequestDto{
  string id = 1;
  string title = 2;
  string source_branch = 3;
  string target_branch = 4;
}