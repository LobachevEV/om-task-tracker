services:
  gitlab-proxy:
    image: onemoretracker-gitlab-proxy
    build:
      context: .
      dockerfile: OneMoreTaskTracker.GitLab.Proxy/Dockerfile
    ports:
      - "5176:8080"
    environment:
      - GitLab__BaseUrl=${GitLab__BaseUrl}

  tasks:
    image: onemoretracker-tasks
    build:
      context: .
      dockerfile: OneMoreTaskTracker.Tasks/Dockerfile
    ports:
      - "5102:8080"

  features:
    image: onemoretracker-features
    build:
      context: .
      dockerfile: OneMoreTaskTracker.Features/Dockerfile
    ports:
      - "5110:8080"
    environment:
      - ConnectionStrings__FeaturesContext=Host=host.docker.internal;Port=5432;Database=Features;Username=postgres;Password=postgres
